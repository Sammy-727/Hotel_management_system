
{% extends "base.html" %}{% block content %}<h1>Restaurant / Room Service</h1>
<div class="panel"><form class="row" method="post"><select name="booking_id">{% for b in bookings %}<option value="{{b.id}}">Booking {{b.id}} - {{b.name}} - Room {{b.room_no}}</option>{% endfor %}</select><select name="item_id">{% for i in items %}<option value="{{i.id}}">{{i.item_name}} - Stock {{i.quantity}} - ₹{{i.price}}</option>{% endfor %}</select><input name="quantity" placeholder="Qty"><button>Add Service</button></form></div>
<div class="panel"><table><tr><th>ID</th><th>Booking</th><th>Item</th><th>Qty</th><th>Amount</th><th>Date</th></tr>{% for u in usage %}<tr><td>{{u.id}}</td><td>{{u.booking_id}}</td><td>{{u.item_name}}</td><td>{{u.quantity}}</td><td>₹{{u.amount}}</td><td>{{u.usage_date}}</td></tr>{% endfor %}</table></div>{% endblock %}
